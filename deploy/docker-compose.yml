services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: amily-web:latest
    container_name: amily-web
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    networks: [amily-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: amily-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    mem_limit: 128m
    cpus: 0.25
    depends_on:
      web:
        condition: service_healthy
    networks: [amily-net]

networks:
  amily-net:
    driver: bridge
